# =====================================================================
# REPLI — uniquement si le proxy via .htaccess ne fonctionne pas
# (mod_proxy non utilisable en .htaccess sur ce serveur).
#
# À transmettre à l'administrateur du serveur : ces lignes sont à insérer
# dans le VirtualHost HTTPS de devweb.estia.fr. Elles ne touchent qu'au
# chemin /tui_assistant/api et n'affectent aucun autre site hébergé.
#
# Prérequis (déjà courants) : a2enmod proxy proxy_http
# =====================================================================

# Le front statique reste servi normalement par Apache depuis
# /var/www/html/tui_assistant — rien à configurer pour lui.

# Seule l'API a besoin d'un reverse-proxy vers le backend Docker (local) :
<Location /tui_assistant/api/>
    ProxyPass        http://127.0.0.1:18000/
    ProxyPassReverse http://127.0.0.1:18000/

    # Streaming SSE (/api/chat/stream) : transmettre au fil de l'eau.
    SetEnv proxy-sendchunked 1
    SetEnv proxy-flushpackets 1
</Location>

# Dans ce cas, retirer la règle de proxy (section 1) du .htaccess :
# le .htaccess ne sert alors qu'au repli SPA (sections 2 et 3).
